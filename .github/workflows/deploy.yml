name: Build, Push & Deploy to Hostinger VPS

on:
  push: #declarative code on push run work flow every time the code pushed inot the main branch
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
        
      - name: Checkout repository
        uses: actions/checkout@v4 
        with: 
          fetch-depth: 0
          
      - name: Show API context files
        run: ls -la Server/ms || true

      - name: Show Web context files
        run: ls -la Client/mc || true
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            taha200933/mgstrm-api-prod
            taha200933/mgstrm-web-prod
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: Server/ms
          file: ${{ github.workspace }}/Server/ms/Dockerfile.prod
          push: true
          tags: taha200933/mgstrm-api-prod:${{ steps.meta.outputs.version }}

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: Client/mc
          file: ${{ github.workspace }}/Client/mc/Dockerfile.prod
          push: true
          tags: taha200933/mgstrm-web-prod:${{ steps.meta.outputs.version }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on Hostinger VPS
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
          export IMAGE_TAG=${{ steps.meta.outputs.version }} &&
            cd ${{ secrets.EC2_APP_DIR }} &&
            git pull origin main  &&
          sudo docker compose -f docker-compose.yaml -f docker-compose.prod.yaml pull &&
          sudo docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d --remove-orphans
          "
# Required GitHub Action secrets:
# EC2_USER: SSH username for the EC2 instance (e.g., 'ubuntu', 'ec2-user')
# EC2_HOST: Public IP address or DNS of the EC2 instance
# EC2_APP_DIR: Absolute path to the application directory on the EC2 instance
# EC2_SSH_KEY: Private SSH key for accessing the EC2 instance (used in the 'Setup SSH agent' step)
